<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse String</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 40px;
            font-family: sans-serif;
        }

        .container {
            max-width: 600px;
        }

        h1 {
            font-weight: bold;
            margin-bottom: 20px;
        }

        #resultText {
            margin: 20px 0;
            font-size: 1.2rem;
            min-height: 1.5em;
        }

        .btn-copy {
            background-color: #6c757d;
            color: white;
            border: none;
        }

        .btn-copy:hover {
            background-color: #5a6268;
            color: white;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Reverse String</h1>

        <input type="text" id="userInput" class="form-control mb-3" placeholder="Hello, welcome to AI4Devs">

        <button id="reverseBtn" class="btn btn-primary">
            Reverse 🔄
        </button>

        <div id="resultText"></div>

        <button id="copyBtn" class="btn btn-copy" style="display: none;">
            Copy 📋
        </button>
    </div>

    <script src="script.js"></script>
</body>

</html>
