<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse String</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }
        h1 {
            color: #111;
        }
        input {
            width: 60%;
            padding: 12px;
            font-size: 18px;
        }
        button {
            margin-top: 15px;
            padding: 12px 18px;
            font-size: 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #3273ff;
            color: #fff;
        }
        .copy-btn {
            background: #555;
        }
        #output {
            margin-top: 25px;
            font-size: 22px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Reverse String</h1>

    <input type="text" id="inputString" placeholder="Hello, welcome to AI4Devs">
    <br>
    <button id="reverseBtn">Reverse 🔄</button>

    <p id="output"></p>

    <button id="copyBtn" class="copy-btn">Copy 📋</button>

    <script src="script.js"></script>
</body>
</html>
