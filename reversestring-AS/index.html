<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse String</title>
    <style>
        /* CSS Integrado para un diseño moderno y minimalista */
        :root {
            --primary-color: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #F3F4F6;
            --container-bg: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border-color: #D1D5DB;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: var(--text-main);
        }

        .container {
            background-color: var(--container-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 600px;
        }

        h1 {
            font-size: 1.75rem;
            text-align: center;
            margin-bottom: 1.5rem;
            color: var(--primary-color);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        label {
            font-weight: 500;
            font-size: 0.95rem;
        }

        /* Usamos textarea para que el texto largo no rompa la UI */
        textarea {
            width: 100%;
            min-height: 100px;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            resize: vertical;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        button.primary-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
        }

        button.primary-btn:hover {
            background-color: var(--primary-hover);
        }

        .result-section {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
            display: none; /* Se oculta hasta que haya resultado */
        }

        .result-section.visible {
            display: block;
        }

        .result-box {
            background-color: #F9FAFB;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 15px;
            word-wrap: break-word;
            white-space: pre-wrap; /* Respeta saltos de línea y espacios */
            min-height: 60px;
        }

        button.secondary-btn {
            background-color: white;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        button.secondary-btn:hover {
            background-color: #F3F4F6;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AsensioDev Reverse String</h1>
    
    <div class="input-group">
        <label for="textInput">Introduce el texto a invertir:</label>
        <textarea id="textInput" placeholder="Ejemplo: AI4Devs..."></textarea>
    </div>

    <button id="reverseBtn" class="primary-btn">Invertir Texto</button>

    <div id="resultSection" class="result-section">
        <label>Resultado:</label>
        <div id="outputDisplay" class="result-box"></div>
        <button id="copyBtn" class="secondary-btn">
            Copiar al portapapeles
        </button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
