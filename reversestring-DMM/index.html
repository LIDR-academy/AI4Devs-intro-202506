<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse String</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <section class="card">
            <h1>Inversor de Texto</h1>
            <p class="subtitle">Escribe algo y mira cómo ocurre la magia.</p>
            
            <div class="input-group">
                <input type="text" id="userInput" placeholder="Escribe aquí..." autocomplete="off">
            </div>

            <div class="result-area">
                <span class="label">Resultado:</span>
                <p id="resultText" class="placeholder-text">El texto invertido aparecerá aquí</p>
            </div>
        </section>
    </main>

<script src="script.js" defer></script>
</body>
</html>
