<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reverse String</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center vh-100">

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow-lg p-4">
          <h2 class="text-center mb-4">Reverse Text Tool</h2>
          <div class="mb-3">
            <label for="inputText" class="form-label">Enter your text:</label>
            <input type="text" id="inputText" class="form-control" maxlength="100" placeholder="Type something..." />
            <small class="text-muted">Maximum 100 characters.</small>
          </div>
          <div class="d-grid">
            <button id="reverseBtn" class="btn btn-primary" disabled>Apply reverse</button>
          </div>
          <div class="mt-4">
            <h5>Reversed text:</h5>
            <div id="result" class="alert alert-secondary" role="alert"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS (optional) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom Script -->
  <script src="script.js"></script>
</body>
</html>
