<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reverse String Input</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">
  <div class="container text-center">
    <h1 class="mb-4">String Reverser</h1>
    <div class="mb-3">
      <input
        type="text"
        id="textInput"
        class="form-control form-control-lg"
        placeholder="Type something here..."
      />
    </div>
    <div class="mb-3">
      <p id="liveText" class="fw-bold fs-4 text-primary"></p>
    </div>
    <button
      id="reverseBtn"
      class="btn btn-success btn-lg"
      style="display: none;"
    >
      Reverse Text
    </button>
    <div class="mt-4">
      <p id="reversedText" class="text-secondary fs-5"></p>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
