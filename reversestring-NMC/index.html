<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse String</title>
    <style>
        body { font-family: sans-serif; padding: 2rem; }
        h1 { font-size: 2.5rem; font-weight: bold; margin-bottom: 1rem; }
        input[type="text"] { width: 100%; max-width: 700px; padding: 0.75rem 1rem; font-size: 1rem; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .btn { padding: 0.6rem 1.2rem; font-size: 1rem; color: white; border: none; border-radius: 6px; cursor: pointer; margin-top: 0.75rem; }
        #copyBtn { background-color: #666; margin-top: 0.5rem; }
        #copyFeedback { font-size: 0.9rem; color: green; margin-top: 0.4rem; min-height: 1.2rem; }
        #output { margin: 1rem 0 0.5rem; font-size: 1.1rem; min-height: 1.5rem; }
    </style>
</head>
<body>
    <h1>Reverse String</h1>
    <input type="text" id="inputText" placeholder="Enter text here..." />
    <div id="output"></div>
    <button class="btn" id="copyBtn" style="display:none;">Copy 📋</button>
    <div id="copyFeedback"></div>
<script src="script.js"></script>
</body>
</html>
