<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDH Reverse String</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>GDH Reverse String</h1>
    </header>

    <main class="container">
        <section class="panel">
            <textarea id="inputEditor" placeholder="Type your text here..."></textarea>
        </section>

        <section class="controls">
            <label class="switch">
                <input type="checkbox" id="reverseToggle">
                <span class="slider"></span>
            </label>
            <p>Reverse it!</p>
        </section>

        <section class="panel">
            <div class="output-container">
                <div id="outputView" class="view-box"></div>
                <button id="copyBtn" title="Copy to clipboard!">Copy</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
