<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reverse String</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f3f3f3;
            color: #20242a;
        }

        .page {
            width: 100%;
            max-width: 1152px;
            min-height: 100vh;
            padding: 36px 56px 60px;
        }

        h1 {
            margin: 0 0 18px;
            font-size: 68px;
            line-height: 1.05;
            font-weight: 700;
            letter-spacing: -1.5px;
        }

        .input-field {
            width: 100%;
            height: 76px;
            padding: 0 24px;
            font-size: 32px;
            border: 2px solid #bfc5cb;
            border-radius: 8px;
            outline: none;
            background: #f7f7f7;
            color: #555c65;
        }

        .input-field::placeholder {
            color: #555c65;
            opacity: 1;
        }

        .primary-btn,
        .secondary-btn {
            border: none;
            border-radius: 8px;
            font-size: 32px;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .primary-btn:hover,
        .secondary-btn:hover {
            opacity: 0.92;
        }

        .primary-btn {
            margin-top: 16px;
            min-width: 210px;
            height: 76px;
            padding: 0 26px;
            background: #3b7bf0;
            color: #ffffff;
        }

        .result {
            margin-top: 38px;
            min-height: 48px;
            font-size: 34px;
            line-height: 1.35;
            color: #22272d;
            word-break: break-word;
        }

        .secondary-btn {
            margin-top: 18px;
            min-width: 170px;
            height: 76px;
            padding: 0 26px;
            background: #7a8088;
            color: #ffffff;
        }

        @media (max-width: 768px) {
            .page {
                padding: 28px 20px 40px;
            }

            h1 {
                font-size: 48px;
            }

            .input-field,
            .primary-btn,
            .secondary-btn {
                height: 64px;
                font-size: 24px;
            }

            .result {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
<main class="page">
    <h1>Reverse String</h1>

    <input
        id="textInput"
        class="input-field"
        type="text"
        placeholder="Hello, welcome to AI4Devs"
    />

    <br />

    <button id="reverseBtn" class="primary-btn" type="button">
        Reverse &#x1F504;
    </button>

    <div id="result" class="result"></div>

    <button id="copyBtn" class="secondary-btn" type="button">
        Copy &#x1F4CB;
    </button>
</main>

<script src="script.js"></script>
</body>
</html>
