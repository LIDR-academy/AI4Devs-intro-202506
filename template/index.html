<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse String</title>
    <style>
        /* Simple styling to center the content and provide basic spacing */
        body {
            font-family: Arial, sans-serif;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f9f9f9;
        }

        h1 {
            margin-bottom: 1rem;
        }

        .container {
            max-width: 400px;
            width: 100%;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.5rem;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 0.5rem;
        }

        button {
            width: 100%;
            padding: 0.5rem;
            font-size: 1rem;
            border: none;
            border-radius: 4px;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }
        button:active {
            background-color: #45a049;
        }

        #output {
            margin-top: 1rem;
            font-size: 1.2rem;
            min-height: 1.5rem;
        }
    </style>
</head>
<body>
    <h1>Reverse a String</h1>
    <div class="container">
        <input type="text" id="inputString" placeholder="Enter a string..." />
        <button id="reverseButton">Reverse</button>
        <div id="output"></div>
    </div>
    <!-- Include the script at the end of the body so elements are loaded first -->
    <script src="script.js"></script>
</body>
</html>
