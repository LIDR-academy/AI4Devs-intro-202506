<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invertir Cadena de Texto</title>
    <script defer src="script.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f7fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        h1 {
            color: #333;
        }

        .container {
            background: white;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        input {
            padding: 8px;
            width: 220px;
            border: 1px solid #ccc;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        button {
            background-color: #0078d7;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            display: none; /* Oculto por defecto */
        }

        button:hover {
            background-color: #005fa3;
        }

        #resultado {
            margin-top: 15px;
            font-weight: bold;
            color: #222;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Invertir Cadena de Texto</h1>
    <input type="text" id="texto" placeholder="Introduce un texto">
    <br>
    <button id="botonInvertir" onclick="mostrarAlerta()">Invertir (extra)</button>
    <p id="resultado"></p>
</div>
</body>
</html>
