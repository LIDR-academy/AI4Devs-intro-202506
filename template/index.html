<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inversor de Cadenas</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #fcfcfc;
      font-family: sans-serif;
    }

    .input-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
    }

    #textoInput {
      padding: 12px 16px;
      border-radius: 24px;
      border: 1px solid #aaaaaa;
      font-size: 1.2rem;
      outline: none;
      width: 260px;
    }

    #invertirBtn {
      padding: 12px 24px;
      border-radius: 24px;
      border: none;
      background: #66F1C2;
      color: #065143;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    #invertirBtn:hover {
      background: #39bea1;
    }

    #resultado {
      margin-top: 28px;
      text-align: center;
      font-size: 2.6rem;
      min-height: 48px;
      color: #015747;
      font-weight: bold;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="input-group">
    <input type="text" id="textoInput" placeholder="Introduce una cadena..." />
    <button id="invertirBtn">invertir</button>
  </div>
  <div id="resultado"></div>
  <script src="script.js"></script>
</body>
</html>
