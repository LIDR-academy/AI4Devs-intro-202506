<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse String</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        
        .container {
            background: #f5f5f5;
            padding: 30px;
            border-radius: 8px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        
        .mode-selector {
            margin-bottom: 20px;
            padding: 15px;
            background: white;
            border-radius: 4px;
        }
        
        .mode-selector label {
            margin-right: 20px;
            cursor: pointer;
            font-size: 16px;
        }
        
        input[type="radio"] {
            margin-right: 5px;
            cursor: pointer;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            margin-bottom: 15px;
        }
        
        button {
            background: #007bff;
            color: white;
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        
        button:hover {
            background: #0056b3;
        }
        
        button.hidden {
            display: none;
        }
        
        .result {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 4px;
            min-height: 20px;
            font-size: 18px;
            color: #333;
        }
        
        .result:empty::after {
            content: 'Reversed string will appear here';
            color: #999;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>String Reverser</h1>
        
        <!-- Mode selector -->
        <div class="mode-selector">
            <label>
                <input type="radio" name="mode" value="button" checked>
                Button Mode
            </label>
            <label>
                <input type="radio" name="mode" value="realtime">
                Real-Time Mode
            </label>
        </div>
        
        <!-- Input field -->
        <input type="text" id="inputString" placeholder="Enter a string to reverse">
        
        <!-- Reverse button (conditional visibility) -->
        <button id="reverseBtn" class="hidden">Reverse</button>
        
        <!-- Result display -->
        <div class="result" id="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
