<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StringOps — String Transformer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:          #0a0a0f;
      --surface:     #12121a;
      --surface-2:   #1a1a26;
      --border:      #2a2a3e;
      --accent:      #00e5ff;
      --accent-dim:  #00e5ff22;
      --accent-2:    #ff3cac;
      --text:        #e8e8f0;
      --text-muted:  #6b6b88;
      --radius:      12px;
      --mono:        'Space Mono', monospace;
      --display:     'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%;
      max-width: 640px;
      padding: 2.5rem 2.5rem 2rem;
      box-shadow:
        0 0 0 1px #ffffff08,
        0 24px 80px #00000080,
        0 0 60px #00e5ff0a;
      animation: card-in 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    header {
      margin-bottom: 2rem;
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
    }

    .logo {
      font-family: var(--display);
      font-size: 1.9rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-tag {
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      padding: 2px 7px;
      border-radius: 4px;
    }

    #tab-container {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.6rem;
      flex-wrap: wrap;
    }

    .tab-btn {
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.35rem 0.8rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    .tab-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .tab-btn.active {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--accent-dim);
      box-shadow: 0 0 12px #00e5ff22;
    }

    #transformer-desc {
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      margin-bottom: 1.5rem;
      min-height: 1.1em;
    }

    .input-group {
      display: flex;
      gap: 0.6rem;
      align-items: stretch;
      margin-bottom: 1.5rem;
    }

    #input-field {
      flex: 1;
      font-family: var(--mono);
      font-size: 1rem;
      color: var(--text);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.85rem 1.1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      caret-color: var(--accent);
    }

    #input-field::placeholder { color: var(--text-muted); }

    #input-field:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim), 0 0 20px #00e5ff18;
    }

    .btn {
      font-family: var(--mono);
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: none;
      border-radius: var(--radius);
      padding: 0 1.1rem;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
      white-space: nowrap;
    }

    .btn:active { transform: scale(0.96); }

    #run-btn {
      visibility: hidden;
      transition: transform 0.15s, box-shadow 0.2s, visibility 0s, opacity 0.2s;
      opacity: 0;
    }

    #run-btn[aria-hidden="false"] {
      visibility: visible;
      opacity: 1;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent) 0%, #0093a5 100%);
      color: #000;
      font-weight: 700;
      box-shadow: 0 4px 20px #00e5ff30;
    }

    .btn-primary:hover { box-shadow: 0 4px 28px #00e5ff50; }

    .btn-ghost {
      background: var(--surface-2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover { color: var(--text); border-color: var(--text-muted); }

    #output-wrapper {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem 1.1rem;
      min-height: 72px;
      position: relative;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    #output-wrapper.has-result {
      border-color: #2a2a3e;
      box-shadow: inset 0 0 24px #00e5ff08;
    }

    .output-label {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.6rem;
    }

    #output-text {
      font-family: var(--mono);
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent);
      word-break: break-all;
      min-height: 1.5em;
      line-height: 1.4;
    }

    @keyframes pop {
      0%   { opacity: 0; transform: translateY(6px); }
      60%  { opacity: 1; transform: translateY(-2px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    #output-text.pop { animation: pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both; }

    .footer-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 0.75rem;
    }

    #copy-btn {
      font-size: 0.72rem;
      padding: 0.3rem 0.8rem;
      border-radius: 6px;
    }

    #copy-btn.copied { color: #00ff99; border-color: #00ff99; }
  </style>
</head>
<body>

  <div class="card">
    <header>
      <span class="logo">StringOps</span>
      <span class="logo-tag">v1.0</span>
    </header>

    <div id="tab-container"></div>
    <p id="transformer-desc"></p>

    <div class="input-group">
      <input
        id="input-field"
        type="text"
        placeholder="Type something… e.g. AI4Devs"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="run-btn"   class="btn btn-primary">Run</button>
      <button id="clear-btn" class="btn btn-ghost">Clear</button>
    </div>

    <div id="output-wrapper">
      <p class="output-label">Result</p>
      <div id="output-text"></div>
    </div>

    <div class="footer-row">
      <button id="copy-btn" class="btn btn-ghost">Copy</button>
    </div>
  </div>

  <!-- script.js must live in the same folder as this file -->
  <script src="script.js"></script>
</body>
</html>
