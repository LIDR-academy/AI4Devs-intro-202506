<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>Invertir cadena — JavaScript (v3, en tiempo real)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="script_v3.js" defer></script>
  </head>
  <body>
    <header>
      <h1>Inversor de cadenas (tiempo real)</h1>
    </header>

    <main>
      <form id="reverseForm" aria-describedby="instrucciones">
        <p id="instrucciones">Escribe en el campo y verás el resultado invertido al instante.</p>

        <label for="textInput">Texto a invertir</label>
        <input id="textInput" name="textInput" type="text" autocomplete="off" />
      </form>

      <section aria-label="Resultado">
        <h2>Resultado</h2>
        <div id="resultOutput" aria-live="polite"></div>
      </section>
    </main>
  </body>
</html>
