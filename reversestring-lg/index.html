<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reverse String</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0d0d0d;
        --surface: #161616;
        --border: #2a2a2a;
        --accent: #00e5ff;
        --accent2: #ff3cac;
        --text: #f0f0f0;
        --muted: #666;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Space Mono", monospace;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      /* Grid background */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
      }

      .container {
        width: min(600px, 92vw);
        animation: fadeUp 0.6s ease both;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .header {
        margin-bottom: 40px;
      }

      .tag {
        font-size: 11px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 10px;
        display: block;
      }

      h1 {
        font-family: "Syne", sans-serif;
        font-size: clamp(2.4rem, 8vw, 3.6rem);
        font-weight: 800;
        line-height: 1;
        background: linear-gradient(90deg, var(--text) 40%, var(--accent));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 32px;
        position: relative;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: -1px;
        border-radius: 12px;
        background: linear-gradient(
          135deg,
          var(--accent),
          transparent 50%,
          var(--accent2)
        );
        opacity: 0.15;
        pointer-events: none;
      }

      label {
        display: block;
        font-size: 11px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 10px;
      }

      .input-wrap {
        position: relative;
        margin-bottom: 20px;
      }

      #inputText {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        font-family: "Space Mono", monospace;
        font-size: 1rem;
        padding: 14px 16px;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }

      #inputText:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.1);
      }

      #inputText::placeholder {
        color: var(--muted);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: "Space Mono", monospace;
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        border: none;
        border-radius: 8px;
        padding: 12px 22px;
        cursor: pointer;
        transition:
          transform 0.15s,
          box-shadow 0.15s,
          filter 0.15s;
      }

      .btn:active {
        transform: scale(0.97);
      }

      .btn-primary {
        background: var(--accent);
        color: #000;
      }

      .btn-primary:hover {
        filter: brightness(1.1);
        box-shadow: 0 0 20px rgba(0, 229, 255, 0.35);
      }

      .btn-primary svg {
        transition: transform 0.4s;
      }
      .btn-primary:hover svg {
        transform: rotate(180deg);
      }

      .divider {
        border: none;
        border-top: 1px solid var(--border);
        margin: 24px 0;
      }

      .output-section {
        display: none;
      }
      .output-section.visible {
        display: block;
        animation: fadeUp 0.35s ease both;
      }

      .output-label {
        font-size: 11px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 10px;
      }

      .result-box {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 14px 16px;
        font-size: 1rem;
        color: var(--accent);
        word-break: break-all;
        min-height: 48px;
        margin-bottom: 16px;
        letter-spacing: 0.02em;
      }

      .btn-secondary {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
      }

      .btn-secondary:hover {
        border-color: var(--accent2);
        color: var(--accent2);
        box-shadow: 0 0 14px rgba(255, 60, 172, 0.2);
      }

      .copy-feedback {
        font-size: 11px;
        color: var(--accent);
        margin-left: 12px;
        opacity: 0;
        transition: opacity 0.3s;
      }

      .copy-feedback.show {
        opacity: 1;
      }

      .footer {
        text-align: center;
        margin-top: 28px;
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.1em;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <span class="tag">// utility tool</span>
        <h1>Reverse<br />String</h1>
      </div>

      <div class="card">
        <div class="input-wrap">
          <label for="inputText">Input</label>
          <input
            type="text"
            id="inputText"
            placeholder="Hello, welcome to AI4Devs"
            autocomplete="off"
            spellcheck="false"
          />
        </div>

        <button
          class="btn btn-primary"
          id="reverseBtn"
          onclick="reverseString()"
        >
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M1 4v6h6" />
            <path d="M23 20v-6h-6" />
            <path
              d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"
            />
          </svg>
          Reverse
        </button>

        <div class="output-section" id="outputSection">
          <hr class="divider" />
          <div class="output-label">Output</div>
          <div class="result-box" id="outputText"></div>
          <div style="display: flex; align-items: center">
            <button
              class="btn btn-secondary"
              id="copyBtn"
              onclick="copyResult()"
            >
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="9" y="9" width="13" height="13" rx="2" />
                <path
                  d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
                />
              </svg>
              Copy
            </button>
            <span class="copy-feedback" id="copyFeedback">Copied!</span>
          </div>
        </div>
      </div>

      <p class="footer">press enter or click reverse</p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
