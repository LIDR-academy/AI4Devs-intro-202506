<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revertir cadena</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Inversor de cadena</h1>
    <input 
      type="text" 
      id="inputText" 
      placeholder="Escribe una cadena..."
      oninput="handleInputChange()"
    />
    <button id="reverseBtn" onclick="reverseString()" style="display:none;">
      Invertir cadena
    </button>
    <p id="result"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
