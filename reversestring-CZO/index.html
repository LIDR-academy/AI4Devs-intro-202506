<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentence Reverser</title>
</head>
<body>

    <h1>Sentence Reverser</h1>

    <label for="sentenceInput">Enter a sentence:</label>
    <textarea id="sentenceInput" rows="4" cols="50" placeholder="e.g., Hello world, this is a test!"></textarea>
    <br><br>

    <button id="reverseButton">Reverse Sentence</button>
    <br><br>

    <h2>Reversed Sentence:</h2>
    <textarea id="resultOutput" rows="4" cols="50" readonly placeholder="Result will appear here..."></textarea>

    <script src="script.js"></script>
</body>
</html>
