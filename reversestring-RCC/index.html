<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse String</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            margin: auto;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px;
            width: 100%;
            display: none;
        }

        .result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Invertir texto</h2>

        <input 
            type="text" 
            id="textInput" 
            placeholder="Escribe aquí..." 
        />

        <button id="reverseBtn">Invertir</button>

        <div class="result">
            Resultado: <span id="result"></span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
