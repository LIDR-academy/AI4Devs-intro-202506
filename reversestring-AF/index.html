<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse String</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
            background-color: #f5f5f5;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 40px;
            text-align: left;
        }
        
        .input-section {
            margin-bottom: 30px;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 16px;
            font-size: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 20px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus {
            border-color: #007AFF;
        }
        
        .reverse-btn {
            background: #007AFF;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            opacity: 0;
            transform: scale(0.9);
            pointer-events: none;
        }
        
        .reverse-btn.visible {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }
        
        .reverse-btn:hover {
            background: #0056CC;
        }
        
        .result-section {
            margin-top: 30px;
        }
        
        .result-text {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 15px;
            min-height: 50px;
            border: 1px solid #e9ecef;
            word-break: break-all;
        }
        
        .copy-btn {
            background: #6c757d;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .copy-btn:hover {
            background: #5a6268;
        }
        
        .copy-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Reverse String</h1>
        
        <div class="input-section">
            <input 
                type="text" 
                id="inputText" 
                placeholder="Hello, welcome to AI4Devs"
                maxlength="1000"
            >
            <button class="reverse-btn" id="reverseBtn" onclick="reverseString()">
                Reverse 🔄
            </button>
        </div>
        
        <div class="result-section">
            <div id="resultText" class="result-text"></div>
            <button class="copy-btn" id="copyBtn" onclick="copyResult()" disabled>
                Copy 📋
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
