<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse String</title>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 100vh;
            margin: 0;
        }

        .container {
            margin-top: 60px;
            width: 500px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border-radius: 10px;
            border: 1px solid #ccc;
            outline: none;
            margin-bottom: 15px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-reverse {
            background-color: #007bff;
            color: white;
        }

        .btn-copy {
            background-color: #6c757d;
            color: white;
        }

        .result {
            margin-top: 20px;
            font-size: 22px;
            word-break: break-word;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Reverse String</h1>

        <input type="text" id="inputText" placeholder="Hello, welcome to AI4Devs">

        <button class="btn-reverse" onclick="reverseText()">
            Reverse 🔄
        </button>

        <div class="result" id="resultText"></div>

        <button class="btn-copy" onclick="copyText()">
            Copy 📋
        </button>
    </div>

    <script src="script.js"></script>
</body>

</html>
