<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reverse String</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 40px; }
    .card { max-width: 540px; padding: 24px; border: 1px solid #e5e7eb; border-radius: 12px; }
    h1 { font-size: 1.25rem; margin: 0 0 12px; }
    label { display: block; font-weight: 600; margin-bottom: 8px; }
    input[type="text"] { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; }
    button { margin-top: 12px; padding: 10px 14px; border: 0; border-radius: 8px; cursor: pointer; }
    button.primary { background: #111827; color: white; }
    .result { margin-top: 16px; padding: 12px; background: #f3f4f6; border-radius: 8px; min-height: 24px; }
    .hint { color: #6b7280; font-size: 0.9rem; margin-top: 6px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Invertir cadena</h1>
    <label for="textInput">Texto</label>
    <input id="textInput" type="text" placeholder="Escribe algo, p. ej. hola" />
    <button id="reverseBtn" class="primary">Invertir</button>
    <div class="hint">Ejemplo: <code>hola</code> ➝ <strong><code>aloh</code></strong></div>

    <div class="result" id="result" aria-live="polite"></div>
  </div>

  <script defer src="scripts.js"></script>
</body>
</html>
