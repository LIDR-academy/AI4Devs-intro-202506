<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reverse string</title>
  <style>
    :root { font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Arial, sans-serif; color: #1f2328; }
    body { margin: 0; background: #ffffff; }
    .wrap { max-width: 980px; margin: 2.5rem auto; padding: 0 1rem; }
    h1 { font-size: 3rem; font-weight: 700; margin: 0 0 1rem 0; }
    .control { margin: 0 0 1rem 0; display: block; }
    .input {
      width: 100%;
      padding: 1rem 1.25rem;
      font-size: 1.25rem;
      border: 1px solid #d0d7de;
      border-radius: 12px;
      outline: none;
    }
    .input:focus { border-color: #2f81f7; box-shadow: 0 0 0 3px rgba(47,129,247,.2); }
    .btn {
      display: inline-flex; align-items: center; gap: .5rem;
      font-size: 1.5rem; font-weight: 600;
      border-radius: 12px; border: 0;
      padding: .9rem 1.25rem; cursor: pointer;
    }
    .btn-primary { background: #2f81f7; color: #fff; }
    .result { margin: 1.25rem 0; font-size: 1.75rem; min-height: 2.25rem; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Reverse String</h1>

    <label class="control" for="textInput">
      <input id="textInput" class="input" type="text" placeholder="Hello, welcome to AI4Devs" autocomplete="off"/>
    </label>

    <div class="control">
      <button id="reverseBtn" class="btn btn-primary" type="button" aria-label="Reverse">Reverse <span aria-hidden="true">🔄</span></button>
    </div>

    <section class="result" id="result" aria-live="polite" aria-atomic="true"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
