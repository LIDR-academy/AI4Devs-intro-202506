<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse String</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 480px;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }

        p.subtitle {
            color: #888;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.85rem 1rem;
            font-size: 1.1rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #667eea;
        }

        button {
            margin-top: 1rem;
            width: 100%;
            padding: 0.85rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.3s, transform 0.1s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.98);
        }

        .result {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #f7f7fb;
            border-radius: 8px;
            min-height: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result span {
            font-size: 1.3rem;
            font-weight: 600;
            color: #764ba2;
            word-break: break-all;
        }

        .result .placeholder {
            color: #bbb;
            font-weight: 400;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Reverse String</h1>
        <p class="subtitle">Enter text and see it reversed instantly</p>
        <input type="text" id="inputText" placeholder="e.g. AI4Devs" autofocus>
        <button id="reverseBtn">Reverse</button>
        <div class="result" id="result">
            <span class="placeholder">Your reversed text will appear here</span>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
